<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Marine Conservation</title>
  <meta name="description" content="Access your Marine Conservation portal. Log in to manage volunteer activities and campaigns.">
  
  <!-- CSS Styles -->
  <link rel="stylesheet" href="./css/style.css">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-body">

  <!-- Floating bubbles background -->
  <div id="bubble-container"></div>

  <a href="./index.html" class="auth-nav"><i data-lucide="arrow-left" style="width:16px; height:16px;"></i> Back to Home</a>

  <div class="auth-card glass reveal-up active">
    <div class="auth-logo" style="margin-bottom: 20px;">
      <a href="./index.html" style="display:flex; align-items:center; justify-content:center;">
        <img src="./assets/webp/logo.webp" alt="Marine Portal" style="height: 48px; width: auto; display: block;">
      </a>
    </div>
    
    <div class="auth-header">
      <h1>Welcome Back</h1>
      <p>Sign in to access your marine conservation dashboard</p>
    </div>

    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label class="form-label">Login As</label>
        <select class="form-control" id="roleSelect" style="appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%2300B4D8%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22m6 9 6 6 6-6%22/></svg>'); background-repeat: no-repeat; background-position: right 1rem center; background-size: 16px;" required>
          <option value="customer">Visitor / Volunteer</option>
          <option value="seller">Campaigner / Organizer</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="you@example.com" required id="emailInput">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="••••••••" required id="passInput">
      </div>

      <button type="submit" class="btn btn-primary form-submit-btn" style="margin-top: 10px;">
        Login <i data-lucide="arrow-right" style="width:18px; height:18px;"></i>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="./signup.html">Create Account</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="./js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
          e.preventDefault();
          const role = document.getElementById('roleSelect').value;
          const email = document.getElementById('emailInput').value;
          
          // Save mock session details (exactly same as Cultural Festivals)
          localStorage.setItem('stackly_logged_in', 'true');
          localStorage.setItem('stackly_user_role', role);
          localStorage.setItem('stackly_user_email', email);
          
          // If no registered name exists, save a default one based on email prefix
          if (!localStorage.getItem('stackly_registered_name')) {
            const defaultName = email.split('@')[0].replace(/[^a-zA-Z]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            localStorage.setItem('stackly_registered_name', defaultName || 'Eco Advocate');
          }

          // Redirect to appropriate dashboard
          if (role === 'seller') {
            window.location.replace('sellerdashboard.html');
          } else {
            window.location.replace('customerdashboard.html');
          }
        });
      }
    });
  </script>
</body>
</html>
